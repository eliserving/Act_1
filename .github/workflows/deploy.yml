name: CI/CD Pipeline - Node.js to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Autenticarse en GHCR dentro del servidor
            # ✅ Fix: Usar PAT en lugar de GITHUB_TOKEN (no funciona fuera de Actions)
            echo ${{ secrets.GHCR_PAT }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Detener y eliminar el contenedor anterior si existe
            # ✅ Fix: sudo para evitar "permission denied"
            sudo docker stop my-node-app || true
            sudo docker rm my-node-app || true

            # Descargar la versión más reciente
            # ✅ Fix: lowercase forzado con ${var,,} para evitar "invalid reference format"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
            sudo docker pull ${IMAGE,,}

            # Ejecutar el nuevo contenedor
            sudo docker run -d \
              --name my-node-app \
              -p 80:3000 \
              --restart always \
              ${IMAGE,,}
