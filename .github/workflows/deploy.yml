name: CI/CD Pipeline - Node.js to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Dejamos IMAGE_NAME vacío aquí para llenarlo dinámicamente en minúsculas
  IMAGE_NAME: ""

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov || true

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  k6-performance:
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Start app in background
        run: |
          npm start &
          echo "Esperando que la app levante..."
          sleep 10

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Run K6 performance test
        run: k6 run tests/load-test.js

  build-and-push:
    needs: k6-performance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ESTE ES EL PASO CLAVE: Convierte el nombre del repo a minúsculas
      - name: Set lower case owner and repo name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Usamos la variable en minúsculas que creamos arriba
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # Repetimos el paso de minúsculas aquí también para el job de deploy
      - name: Set lower case repo name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy via Bastion Host to servidor-docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no \
                -i ~/.ssh/github_deploy \
                g2022371031@10.0.2.4 << 'ENDSSH'
              echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
                -u ${{ github.actor }} --password-stdin
              
              docker stop my-node-app || true
              docker rm my-node-app || true
              
              # Aquí IMAGE_NAME ya vendrá en minúsculas (ej: eliserving/act_1)
              docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
              
              docker run -d \
                --name my-node-app \
                -p 80:3000 \
                --restart always \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            ENDSSH
